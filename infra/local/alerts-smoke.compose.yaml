services:
  alerts-postgres:
    image: postgres:16-alpine
    container_name: aquapulse-alerts-smoke-postgres
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: aquapulse
      POSTGRES_USER: aquapulse
      POSTGRES_PASSWORD: change-me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquapulse -d aquapulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - aquapulse_alerts_smoke_pgdata:/var/lib/postgresql/data

volumes:
  aquapulse_alerts_smoke_pgdata:
